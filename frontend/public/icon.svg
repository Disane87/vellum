<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Envelope body -->
  <rect x="96" y="176" width="320" height="220" rx="16" fill="white" opacity="0.95"/>
  <!-- Envelope flap (V shape) -->
  <path d="M96 192 L256 310 L416 192" fill="none" stroke="url(#flap)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle inner shadow on envelope -->
  <path d="M112 380 L256 280 L400 380" fill="none" stroke="white" stroke-width="8" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
